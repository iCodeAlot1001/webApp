{% extends 'accounts/base.html' %}
{% block content %}
{% csrf_token %}
<div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-4">Welcome, {{ user.username }}!</h2>
    <p>Bio: {{ user.userprofile.bio|default:"No bio provided." }}</p>
    <a href="{% url 'logout' %}" class="bg-red-500 text-white p-2 rounded hover:bg-red-600">Logout</a>
</div>
<div><p>hello world</p></div>
{% endblock %}
